# ============================================================
#  Configuration MARINFO Backend - version corrigée
# ============================================================
spring.application.name=marinfo-backend
server.port=8080
server.servlet.context-path=/

# Base H2 intégrée : aucun mot de passe MySQL nécessaire pour le test local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/marinfo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Casablanca

# JWT
marinfo.jwt.secret=Z2VuZXJlci11bmUtY2xlLXNlY3JldGUtYXNzZXotbG9uZ3VlLXBvdXItam9zb24td2ViLXRva2VuLW1hcmluZm8tMjAyNg==
marinfo.jwt.expiration-ms=86400000

# Logging
logging.level.root=INFO
logging.level.ma.marinfo=INFO
logging.level.org.springframework.security=INFO

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
