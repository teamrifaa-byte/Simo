# ============================================================
#  Configuration MARINFO Backend - version corrigée
# ============================================================
spring.application.name=marinfo-backend
server.port=8080
server.servlet.context-path=/

# Base H2 intégrée : aucun mot de passe MySQL nécessaire pour le test local
spring.datasource.url=jdbc:h2:mem:marinfo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Casablanca

# JWT
marinfo.jwt.secret=Z2VuZXJlci11bmUtY2xlLXNlY3JldGUtYXNzZXotbG9uZ3VlLXBvdXItam9zb24td2ViLXRva2VuLW1hcmluZm8tMjAyNg==
marinfo.jwt.expiration-ms=86400000

# Logging
logging.level.root=INFO
logging.level.ma.marinfo=INFO
logging.level.org.springframework.security=INFO

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
